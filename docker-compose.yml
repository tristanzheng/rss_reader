version: '3.9'
services:
  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - '3000:3000'
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://postgres:postgres@db:5432/rss_reader
      - REDIS_URL=redis://redis:6379
      - DB_TYPE=postgres
      - WORKER_DISABLED=1
    depends_on:
      - db
      - redis
  worker:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    command: npm -w @rss/server run start:worker
    environment:
      - DATABASE_URL=postgres://postgres:postgres@db:5432/rss_reader
      - REDIS_URL=redis://redis:6379
      - DB_TYPE=postgres
      - WORKER_DISABLED=0
      - WORKER_SCHEDULE_USER_ID=demo-user
      - WORKER_SCHEDULE_INTERVAL_MINUTES=30
      - WORKER_TICK_MS=60000
    depends_on:
      - db
      - redis
  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=rss_reader
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  nginx:
    image: nginx:1.27-alpine
    ports:
      - '80:80'
    depends_on:
      - api
    volumes:
      - ./ops/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  pg_data:
